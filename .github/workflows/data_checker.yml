name: Automate Data Integration

on:
  push:
    paths:
      - 'data-hub/**'  # Trigger when any CSV file in data-hub/ is updated

jobs:
  data_integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run Data Integration Script
        run: |
          chmod +x scripts/data_integrate.sh
          bash scripts/data_integrate.sh

      - name: Commit and Push Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add db/dataset.csv  # Don't include integration.log, as we no longer use it
          git commit -m "Automated integration of datasets"
          git push
