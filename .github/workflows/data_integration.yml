name: Automate Data Integration

on:
  push:
    paths:
      - 'data-hub/**'  # Trigger only when files in the 'data-hub' folder change

jobs:
  data_integration:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Debug - List file structure
      - name: List file structure
        run: ls -lh

      # Step 3: Run integration script
      - name: Run data integration script
        run: |
          chmod +x integrate_data.sh
          ./integrate_data.sh

      # Step 4: Commit and push changes if modified
      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "successnwachukwu368@gmail.com"  # Your updated email
          git config --global user.name "Nsuccess"  # Your updated username

          # Create a unique branch name with a timestamp
          timestamp=$(date +'%Y%m%d%H%M%S')
          branch_name="update-dataset-${timestamp}"
          git checkout -b "${branch_name}"

          # Stage and commit changes if there are any
          git add db/dataset.csv
          git diff --cached --exit-code || git commit -m "Updated db/dataset.csv after integration"
          
          # Push the new branch and merge it into the main branch
          git push origin "${branch_name}"
          git checkout main
          git merge --no-ff "${branch_name}"
          git push origin main

          # Cleanup: Delete the temporary branch locally and remotely
          git branch -d "${branch_name}"
          git push origin --delete "${branch_name}"
