name: Automate Data Integration

on:
  push:
    paths:
      - 'data-hub/**'  # Only triggers when files in the data-hub folder change

jobs:
  data_integration:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Run the integration script
      - name: Run data integration script
        run: |
          chmod +x data_integration.sh
          ./data_integration.sh

      # Step 3: Commit and push changes
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add db/consolidated_data.csv
          git commit -m "Update consolidated data"
          git push
