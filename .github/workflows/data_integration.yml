name: Automate Data Integration

on:
  push:
    paths:
      - 'data-hub/**'  # Trigger only when files in the 'data-hub' folder change

jobs:
  data_integration:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Debug - List file structure
      - name: List file structure
        run: ls -lh

      # Step 3: Run integration script
      - name: Run data integration script
        run: |
          chmod +x integrate_data.sh
          ./integrate_data.sh

      # Step 4: Debug - Validate output
      - name: Validate consolidated file
        run: |
          ls -lh db/
          head -n 5 db/integrated_data.csv

      # Step 5: Commit and push changes only if there are modifications
      - name: Commit and push changes
        if: ${{ github.event_name == 'push' && github.event.head_commit != null }}  # Ensure changes were made
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # GitHub token for authentication
        run: |
          git config --global user.email "successnwachukwu368@gmail.com"
          git config --global user.name "Nsuccess"
          
          # Check for changes and commit only if there are modifications
          git add .  # Stage all modified files
          git diff --cached --exit-code || (git commit -m "Update integrated data" && git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:master)
