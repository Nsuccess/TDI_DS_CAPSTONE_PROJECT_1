name: Automate Data Integration

on:
  push:
    paths:
      - 'data-hub/**'  # Trigger only when files in the 'data-hub' folder change

jobs:
  data_integration:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Debug - List file structure
      - name: List file structure
        run: ls -lh

      # Step 3: Run integration script
      - name: Run data integration script
        run: |
          echo "Ensuring integrate_data.sh is executable..."
          chmod +x integrate_data.sh
          echo "Running integrate_data.sh..."
          ./integrate_data.sh

      # Step 4: Debug - Validate output
      - name: Validate consolidated file
        run: |
          echo "Listing contents of the db folder..."
          ls -lh db/
          echo "Previewing the first 5 rows of the consolidated data file..."
          head -n 5 db/integrated_data.csv

      # Step 5: Commit and push changes
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          echo "Staging all changes..."
          git add -A
          echo "Committing changes..."
          git commit -m "Update integrated data"
          echo "Pushing changes..."
          git push
