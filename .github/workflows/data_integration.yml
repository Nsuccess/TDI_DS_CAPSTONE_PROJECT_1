# .github/workflows/data_integration.yml
name: Automate Data Integration

on:
  push:
    paths:
      - 'data-hub/**'  # Only triggers when files in the data-hub folder change

jobs:
  data_integration:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Run the integration script (use the correct script name)
      - name: Run data integration script
        run: |
          chmod +x integrate_data.sh
          ./integrate_data.sh

      # Step 3: Commit and push the updated data back to GitHub
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add db/consolidated_data.csv
          git commit -m "Update consolidated data"
          git push
